spring.application.name=first-spring-app

# --- Banco de dados (H2 em memoria) ---
# Nao exige instalar nada: sobe e morre junto com a aplicacao.
# Equivalente ao SQLite em memoria que o Laravel usa em testes (DB_CONNECTION=sqlite, :memory:).
spring.datasource.url=jdbc:h2:mem:tarefasdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console web do H2 para inspecionar as tabelas no navegador (http://localhost:8080/h2-console)
# JDBC URL a usar no console: jdbc:h2:mem:tarefasdb
spring.h2.console.enabled=true

# ddl-auto=update: o Hibernate cria/atualiza as tabelas com base nas entidades @Entity.
# Equivalente a rodar "php artisan migrate" automaticamente a cada start (bom para estudo, ruim para producao).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
